server:
  host: "0.0.0.0"
  port: 8080
  tls:
    enabled: false
    cert: "server.crt"
    key: "server.key"

auth:
  key: "your-secret-key"

heartbeat:
  interval: 30      # heartbeat check interval in seconds
  timeout: 90       # heartbeat timeout in seconds

log:
  level: "info"     # debug/info/warn/error
  file: ""          # empty for stdout, or path to log file
